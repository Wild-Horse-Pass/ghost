name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The Tauri desktop crates (wraith-wallet-gui, ghost-tap-desktop) need a built
  # JS frontend (`dist/`) before `tauri::generate_context!` will compile, which is
  # a separate Node pipeline from the Rust workspace. They are excluded from the
  # pure-Rust jobs below and built on their own; everything else gets full coverage.
  WORKSPACE_EXCLUDES: --workspace --exclude wraith-wallet-gui --exclude ghost-tap-desktop
  # System packages the Rust workspace needs: Cap'n Proto (bitcoin-core-sv2 build
  # script) and SQLite (ghost-storage / ghost-pay).
  LINUX_DEPS: libsqlite3-dev capnproto libcapnp-dev

jobs:
  # Format check
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Clippy lints
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      # L-01: Removed needless_borrows_for_generic_args and useless_vec allows
      - run: cargo clippy $WORKSPACE_EXCLUDES --all-targets --all-features -- -W clippy::all -A clippy::derivable_impls -A clippy::clone_on_copy -A clippy::match_like_matches_macro -A clippy::manual_flatten -A clippy::redundant_slicing -A clippy::skip_while_next

  # Build and test
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Install system dependencies (Linux)
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS

      # Install system dependencies (macOS). Cap'n Proto for bitcoin-core-sv2's
      # build script; SQLite ships with macOS.
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install capnp

      # Build
      - name: Build
        run: cargo build $WORKSPACE_EXCLUDES --all-targets

      # Run unit tests
      - name: Run unit tests
        run: cargo test $WORKSPACE_EXCLUDES --lib --bins

      # Run integration tests
      - name: Run integration tests
        run: cargo test --test integration

      # Run wraith-wallet integration tests (separate from --lib --bins).
      # These spin up the real wraithd binary against a tempdir socket, plus
      # in-process mock GSPs — locks the wallet IPC and streaming push-channel
      # contracts. Linux only: macOS runners can't bind Unix sockets the same
      # way (shorter sun_path limit) and we don't need cross-platform coverage
      # here; the unit + lib tests above already do.
      - name: Run wraith-wallet integration tests
        if: runner.os == 'Linux'
        run: |
          cargo test -p wraith-wallet-ipc
          cargo test -p wraith-wallet-core --tests
          cargo test -p wraith-wallet-daemon --tests

  # Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps $WORKSPACE_EXCLUDES --all-features

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # H-07: Security audit failures should block CI
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  # Minimum Supported Rust Version
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - run: cargo check $WORKSPACE_EXCLUDES

  # Coverage (optional, runs on main only)
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y $LINUX_DEPS
      - name: Generate coverage
        run: cargo llvm-cov $WORKSPACE_EXCLUDES --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
