name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Format check
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      # Don't checkout submodules for fmt - sv2-apps has nightly-only rustfmt.toml
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Clippy lints
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev
      # L-01: Removed needless_borrows_for_generic_args and useless_vec allows
      - run: cargo clippy --all-targets --all-features -- -W clippy::all -A clippy::derivable_impls -A clippy::clone_on_copy -A clippy::match_like_matches_macro -A clippy::manual_flatten -A clippy::redundant_slicing -A clippy::skip_while_next

  # Build and test
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Install system dependencies (Linux)
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev \
            capnproto \
            libcapnp-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Build
      - name: Build
        run: cargo build --workspace --all-targets

      # Run unit tests
      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      # Run integration tests
      - name: Run integration tests
        run: cargo test --test integration

      # Run wraith-wallet integration tests (separate from --lib --bins).
      # These spin up the real wraithd binary against a tempdir socket, plus
      # in-process mock GSPs — locks the wallet IPC and streaming push-channel
      # contracts. Linux only: macOS runners can't bind Unix sockets the same
      # way (shorter sun_path limit) and we don't need cross-platform coverage
      # here; the unit + lib tests above already do.
      - name: Run wraith-wallet integration tests
        if: runner.os == 'Linux'
        run: |
          cargo test -p wraith-wallet-ipc
          cargo test -p wraith-wallet-core --tests
          cargo test -p wraith-wallet-daemon --tests

  # Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # H-07: Security audit failures should block CI
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  # Minimum Supported Rust Version
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev
      - run: cargo check --workspace

  # Coverage (optional, runs on main only)
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
