name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # Install system dependencies (Linux)
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev capnproto libcapnp-dev

      # Install system dependencies (macOS) — capnproto for the SV2 stratum-core dep
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install capnp

      # Build only the binaries this release ships (node + SV2). Building the
      # whole workspace would pull in the desktop wallet/mobile apps (Tauri GUIs
      # need webkit, and the wallet daemon may be mid-development) which are not
      # release artifacts here.
      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p ghost-pool -p ghost-cli -p ghost-pay -p ghost-gsp-bin \
            -p translator_sv2 -p pool_sv2 -p jd_client_sv2 -p jd_server_sv2

      # Package binaries
      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          # Copy binaries (check actual names from target directory)
          for bin in ghost-pool ghost-cli ghost-pay ghost-gsp translator_sv2 pool_sv2 jd_client_sv2 jd_server_sv2 ghost-light-wallet ghost-light-wallet-tui; do
            if [ -f "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" ]; then
              cp "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" dist/
            fi
          done

          # Create archive only if dist has files
          cd dist
          if [ -n "$(ls -A .)" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              7z a ../bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.zip *
            else
              tar czvf ../bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
            fi
          else
            echo "No binaries found to package"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-ghost-${{ matrix.target }}
          path: bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sort > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      # PGP-sign the checksum manifest so releases are verifiable against the
      # maintainer key (fingerprint published in SECURITY.md). Requires repo
      # secrets GPG_PRIVATE_KEY (armoured private key) and GPG_PASSPHRASE; when
      # unset, the manifest is published unsigned.
      - name: PGP-sign SHA256SUMS
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 \
            --armor --detach-sign --output SHA256SUMS.txt.asc SHA256SUMS.txt
          gpg --verify SHA256SUMS.txt.asc SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            SHA256SUMS.txt
            SHA256SUMS.txt.asc
