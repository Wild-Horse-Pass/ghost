name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # Install system dependencies (Linux)
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      # Build release binaries
      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # Package binaries
      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          # Copy binaries (check actual names from target directory)
          for bin in ghost-pool ghost-cli ghost-pay translator ghost-gsp ghost-light-wallet ghost-light-wallet-tui; do
            if [ -f "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" ]; then
              cp "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" dist/
            fi
          done

          # Create archive only if dist has files
          cd dist
          if [ -n "$(ls -A .)" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              7z a ../bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.zip *
            else
              tar czvf ../bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
            fi
          else
            echo "No binaries found to package"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-ghost-${{ matrix.target }}
          path: bitcoin-ghost-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
