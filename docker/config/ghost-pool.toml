# Ghost Pool Configuration for Docker
# Environment variables are substituted at runtime

[identity]
key_path = "/etc/ghost/node.key"
display_name = "Ghost Pool (Docker)"

[bitcoin]
# These are overridden by environment variables
rpc_host = "bitcoind"
rpc_port = 8332
rpc_user = "ghostrpc"
rpc_password = "changeme"
network = "signet"
zmq_hashblock = "tcp://bitcoind:28332"
zmq_hashtx = "tcp://bitcoind:28333"

[network]
public_address = ""
sv2_port = 34255
sv1_port = 3333
http_port = 8080
max_miners = 1000
public_mining = true

[network.p2p]
share_propagation = 8555
block_announcement = 8556
consensus_voting = 8557
health_monitoring = 8558
discovery = 8559
elder_management = 8560
payout_proposal = 8561
payout_transaction = 8562

[policy]
profile = "bitcoin_pure"

[storage]
db_path = "/var/lib/ghost/data"
wal_mode = true
archive_mode = true
prune_height = 0

[pool]
treasury_address = ""
treasury_fee_percent = 1.0
min_payout_sats = 10000

[ghost_pay]
enabled = true
virtual_block_secs = 10
epoch_blocks = 100
transfer_fee_bps = 10
min_transfer_fee_sats = 100
wraith_enabled = true
wraith_fee_percent = 0.5
