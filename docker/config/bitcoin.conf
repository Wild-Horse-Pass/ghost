# Bitcoin Core Configuration for Ghost Pool
# This config is designed for Docker deployment

# Network Settings
server=1
txindex=1
listen=1
discover=1

# RPC Configuration
# SECURITY: No default credentials - BITCOIN_RPC_USER and BITCOIN_RPC_PASSWORD must be set
# The entrypoint script validates these are set before starting bitcoind
rpcuser=${BITCOIN_RPC_USER}
rpcpassword=${BITCOIN_RPC_PASSWORD}
rpcallowip=172.28.0.0/16
rpcbind=0.0.0.0

# ZMQ Configuration (required for Ghost Pool)
zmqpubhashblock=tcp://0.0.0.0:28332
zmqpubhashtx=tcp://0.0.0.0:28333
zmqpubrawtx=tcp://0.0.0.0:28334

# Mining Settings
blockmaxweight=4000000

# Performance Tuning
dbcache=2048
maxconnections=125
maxmempool=300

# Logging
debug=rpc
printtoconsole=1

# Network (uncomment one)
# mainnet (default)
# signet=1
# testnet=1
# regtest=1
