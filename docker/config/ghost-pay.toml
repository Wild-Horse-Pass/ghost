# Ghost Pay L2 Configuration for Docker

[identity]
key_path = "/etc/ghost/node.key"
display_name = "Ghost Pay (Docker)"

[pool]
host = "ghost-pool"
port = 8080

[ghost_pay]
enabled = true
virtual_block_secs = 10
epoch_blocks = 100
wraith_enabled = true

[storage]
db_path = "/var/lib/ghost/data"
wal_mode = true

[server]
port = 8081
