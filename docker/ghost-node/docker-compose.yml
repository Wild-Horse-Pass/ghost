#|======================================================================================================================|
#|  GHOST NODE - Docker Compose                                                                                        |
#|  Run with: docker-compose up -d                                                                                     |
#|======================================================================================================================|

version: '3.8'

services:
  # Ghost Service Provider - WebSocket API for light wallets
  ghost-gsp:
    build: .
    container_name: ghost-gsp
    restart: unless-stopped
    ports:
      - "8900:8900"   # WSS API for wallets
    volumes:
      - gsp-data:/data
    environment:
      - RUST_LOG=info
      - GSP_BIND=0.0.0.0:8900
      - PAY_NODE_URL=http://ghost-pay:8800
    depends_on:
      - ghost-pay
    networks:
      - ghost-net

  # Ghost Pay - Payment routing
  ghost-pay:
    build: .
    container_name: ghost-pay
    entrypoint: ["ghost-pay"]
    restart: unless-stopped
    ports:
      - "8800:8800"
    volumes:
      - pay-data:/data
    environment:
      - RUST_LOG=info
    networks:
      - ghost-net

  # Ghost Pool - Mining pool
  ghost-pool:
    build: .
    container_name: ghost-pool
    entrypoint: ["ghost-pool"]
    restart: unless-stopped
    ports:
      - "8080:8080"   # Pool API
      - "3333:3333"   # Stratum
    volumes:
      - pool-data:/data
    environment:
      - RUST_LOG=info
    networks:
      - ghost-net

  # Ghost Coordinator - Consensus coordination
  ghost-coordinator:
    build: .
    container_name: ghost-coordinator
    entrypoint: ["ghost-coordinator"]
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - coordinator-data:/data
    environment:
      - RUST_LOG=info
    networks:
      - ghost-net

volumes:
  gsp-data:
  pay-data:
  pool-data:
  coordinator-data:

networks:
  ghost-net:
    driver: bridge
