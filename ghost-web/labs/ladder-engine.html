<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ladder Script Builder | Ghost Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #050505; --darker: #0a0a0a; --dark: #0f0f0f;
      --gray-900: #141414; --gray-800: #1a1a1a; --gray-700: #242424;
      --gray-600: #333333; --gray-500: #4a4a4a; --gray-400: #666666;
      --gray-300: #888888; --gray-200: #aaaaaa; --gray-100: #cccccc;
      --white: #f0f0f0;
      --orange: #f7931a; --orange-light: #ffb347;
      --font-display: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Geist Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font-display); background: var(--black); color: var(--gray-100); }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 0; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gray-800); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; padding: 0 24px; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--white); }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text { font-weight: 700; font-size: 18px; }
    .logo-text span { color: var(--orange); }
    .nav-breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gray-400); }
    .nav-breadcrumb a { color: var(--gray-400); text-decoration: none; }
    .nav-breadcrumb a:hover { color: var(--white); }
    .nav-breadcrumb .sep { color: var(--gray-600); }
    .nav-breadcrumb .current { color: var(--orange); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; font-family: var(--font-display); font-size: 13px; font-weight: 600; border-radius: 8px; text-decoration: none; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-secondary { background: var(--gray-800); color: var(--white); }
    .btn-secondary:hover { background: var(--gray-700); }

    .engine-frame { position: fixed; top: 53px; left: 0; width: 100%; height: calc(100vh - 53px); border: none; display: block; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><img src="../logo.png" alt="Bitcoin Ghost"></div>
        <div class="logo-text">Bitcoin<span>Ghost</span></div>
      </a>
      <div class="nav-breadcrumb">
        <a href="../ghost-labs.html">Labs</a>
        <span class="sep">/</span>
        <a href="ladder-script.html">Ladder Script</a>
        <span class="sep">/</span>
        <span class="current">Builder</span>
      </div>
      <div class="nav-right">
        <a href="ladder-script.html" class="btn btn-secondary">Back to Docs</a>
      </div>
    </div>
  </nav>
  <iframe id="engine" class="engine-frame" title="Ladder Script Builder"></iframe>
  <script>
    var q = window.location.search;
    document.getElementById('engine').src = 'engine/index.html' + (q ? q : '');
  </script>
</body>
</html>
