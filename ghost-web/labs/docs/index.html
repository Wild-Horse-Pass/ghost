<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation | Ladder Script</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #050505; --darker: #0a0a0a; --dark: #0f0f0f;
      --gray-900: #141414; --gray-800: #1a1a1a; --gray-700: #242424;
      --gray-600: #333333; --gray-500: #4a4a4a; --gray-400: #666666;
      --gray-300: #888888; --gray-200: #aaaaaa; --gray-100: #cccccc;
      --white: #f0f0f0;
      --orange: #f7931a; --orange-light: #ffb347;
      --cyan: #00d4ff; --green: #00ff88;
      --amber: #e6a817;
      --font-display: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Geist Mono', monospace;
      --font-engine: 'IBM Plex Mono', 'Consolas', monospace;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-display); background: var(--black); color: var(--gray-100); line-height: 1.6; }
    ::selection { background: var(--orange); color: var(--black); }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 0; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gray-800); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; padding: 0 24px; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--white); }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text { font-weight: 700; font-size: 18px; }
    .logo-text span { color: var(--orange); }
    .nav-breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gray-400); }
    .nav-breadcrumb a { color: var(--gray-400); text-decoration: none; }
    .nav-breadcrumb a:hover { color: var(--white); }
    .nav-breadcrumb .sep { color: var(--gray-600); }
    .nav-breadcrumb .current { color: var(--orange); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; font-family: var(--font-display); font-size: 13px; font-weight: 600; border-radius: 8px; text-decoration: none; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-secondary { background: var(--gray-800); color: var(--white); }
    .btn-secondary:hover { background: var(--gray-700); }
    .btn-ghost { background: transparent; color: var(--gray-300); padding: 8px 12px; }
    .btn-ghost:hover { color: var(--white); }

    /* Layout */
    .layout { display: grid; grid-template-columns: 240px 1fr; margin-top: 53px; min-height: calc(100vh - 53px); }

    /* Sidebar */
    .sidebar { background: var(--gray-900); border-right: 1px solid var(--gray-800); padding: 24px 0; position: sticky; top: 53px; height: calc(100vh - 53px); overflow-y: auto; }
    .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-400); padding: 8px 20px; }
    .sidebar-link { display: block; padding: 8px 20px; font-size: 14px; color: var(--gray-300); text-decoration: none; transition: all 0.15s; border-left: 2px solid transparent; }
    .sidebar-link:hover { color: var(--white); background: var(--gray-800); }
    .sidebar-link.active { color: var(--orange); border-left-color: var(--orange); background: rgba(247, 147, 26, 0.05); }
    .sidebar-divider { height: 1px; background: var(--gray-800); margin: 12px 0; }

    /* Content */
    .content { padding: 40px 48px 80px; max-width: 800px; }
    .content-loading { text-align: center; padding: 80px 0; color: var(--gray-400); font-family: var(--font-mono); }

    /* Markdown Styles */
    .md h1 { font-size: 32px; font-weight: 800; color: var(--white); margin: 0 0 24px; letter-spacing: -0.02em; }
    .md h2 { font-size: 24px; font-weight: 700; color: var(--white); margin: 48px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-800); }
    .md h3 { font-size: 18px; font-weight: 600; color: var(--white); margin: 32px 0 12px; }
    .md h4 { font-size: 15px; font-weight: 600; color: var(--gray-200); margin: 24px 0 8px; }
    .md p { font-size: 15px; color: var(--gray-300); line-height: 1.8; margin: 0 0 16px; }
    .md a { color: var(--orange); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md strong { color: var(--white); font-weight: 600; }
    .md em { color: var(--gray-200); }
    .md ul, .md ol { margin: 0 0 16px 24px; color: var(--gray-300); }
    .md li { margin-bottom: 6px; font-size: 15px; line-height: 1.7; }
    .md li p { margin-bottom: 6px; }
    .md blockquote { border-left: 3px solid var(--orange); padding: 12px 20px; margin: 16px 0; background: rgba(247, 147, 26, 0.05); border-radius: 0 8px 8px 0; }
    .md blockquote p { color: var(--gray-200); margin-bottom: 0; }
    .md code { font-family: var(--font-engine); font-size: 13px; background: #2a2a2a; color: var(--amber); padding: 2px 6px; border-radius: 4px; }
    .md pre { background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 16px; overflow-x: auto; margin: 16px 0; }
    .md pre code { background: none; padding: 0; font-size: 13px; color: #d4d4d4; line-height: 1.6; }
    .md table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    .md th { text-align: left; padding: 10px 12px; background: var(--gray-900); border: 1px solid var(--gray-800); color: var(--white); font-weight: 600; font-size: 13px; }
    .md td { padding: 8px 12px; border: 1px solid var(--gray-800); color: var(--gray-300); font-size: 13px; }
    .md td code { font-size: 12px; }
    .md tr:hover td { background: rgba(247, 147, 26, 0.03); }
    .md hr { border: none; height: 1px; background: var(--gray-800); margin: 32px 0; }
    .md img { max-width: 100%; border-radius: 8px; margin: 16px 0; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: -260px; width: 260px; z-index: 50; transition: left 0.3s; height: 100vh; top: 0; padding-top: 70px; }
      .sidebar.open { left: 0; }
      .sidebar-toggle { display: flex; }
      .content { padding: 24px 20px 80px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../../index.html" class="logo">
        <div class="logo-icon"><img src="../../logo.png" alt="Bitcoin Ghost"></div>
        <div class="logo-text">Bitcoin<span>Ghost</span></div>
      </a>
      <div class="nav-breadcrumb">
        <a href="../../ghost-labs.html">Labs</a>
        <span class="sep">/</span>
        <a href="../ladder-script.html">Ladder Script</a>
        <span class="sep">/</span>
        <span class="current" id="breadcrumb-title">Docs</span>
      </div>
      <div class="nav-right">
        <a href="../ladder-script.html" class="btn btn-secondary">Back to Project</a>
      </div>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-label">Ladder Script Docs</div>
      <a href="#SUMMARY" class="sidebar-link" data-doc="SUMMARY.md" data-title="Executive Summary">Executive Summary</a>
      <a href="#BIP-XXXX" class="sidebar-link" data-doc="BIP-XXXX.md" data-title="BIP-XXXX">BIP-XXXX</a>
      <a href="#WHITEPAPER" class="sidebar-link" data-doc="WHITEPAPER.md" data-title="Whitepaper">Whitepaper</a>
      <a href="#SPECIFICATION" class="sidebar-link" data-doc="SPECIFICATION.md" data-title="Technical Specification">Technical Specification</a>
      <div class="sidebar-divider"></div>
      <a href="#BLOCK_LIBRARY" class="sidebar-link" data-doc="BLOCK_LIBRARY.md" data-title="Block Library">Block Library</a>
      <a href="#EXAMPLES" class="sidebar-link" data-doc="EXAMPLES.md" data-title="Examples">Examples</a>
      <a href="#INTEGRATION" class="sidebar-link" data-doc="INTEGRATION.md" data-title="Integration Guide">Integration Guide</a>
      <a href="#SOFT_FORK_GUIDE" class="sidebar-link" data-doc="SOFT_FORK_GUIDE.md" data-title="Soft Fork Guide">Soft Fork Guide</a>
      <div class="sidebar-divider"></div>
      <a href="#FAQ" class="sidebar-link" data-doc="FAQ.md" data-title="FAQ">FAQ</a>
      <a href="#GLOSSARY" class="sidebar-link" data-doc="GLOSSARY.md" data-title="Glossary">Glossary</a>
      <a href="#README" class="sidebar-link" data-doc="README.md" data-title="README">README</a>
    </aside>

    <main class="content">
      <div class="content-loading" id="loading">Loading documentation...</div>
      <div class="md" id="doc-content"></div>
    </main>
  </div>

  <script>
    const docContent = document.getElementById('doc-content');
    const loading = document.getElementById('loading');
    const breadcrumb = document.getElementById('breadcrumb-title');
    const links = document.querySelectorAll('.sidebar-link');
    let currentDoc = null;

    async function loadDoc(filename, title) {
      if (currentDoc === filename) return;
      currentDoc = filename;
      loading.style.display = 'block';
      docContent.innerHTML = '';
      breadcrumb.textContent = title;
      document.title = title + ' | Ladder Script';

      links.forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector(`[data-doc="${filename}"]`);
      if (activeLink) activeLink.classList.add('active');

      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        loading.style.display = 'none';
        docContent.innerHTML = marked.parse(md);
      } catch (e) {
        loading.style.display = 'none';
        docContent.innerHTML = '<p style="color:var(--gray-400);">Could not load document.</p>';
      }
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const doc = link.dataset.doc;
        const title = link.dataset.title;
        history.pushState(null, '', '#' + doc.replace('.md', ''));
        loadDoc(doc, title);
      });
    });

    function loadFromHash() {
      const hash = location.hash.slice(1);
      if (hash) {
        const link = document.querySelector(`[data-doc="${hash}.md"]`) ||
                     document.querySelector(`[data-doc="${hash}"]`);
        if (link) {
          loadDoc(link.dataset.doc, link.dataset.title);
          return;
        }
      }
      loadDoc('SUMMARY.md', 'Executive Summary');
    }

    window.addEventListener('hashchange', loadFromHash);
    window.addEventListener('DOMContentLoaded', loadFromHash);
  </script>
</body>
</html>
