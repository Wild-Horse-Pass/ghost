<!-- Ghost Pool quasar — hash visualisation prototype -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quasar · Ghost Pool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090b;
    --fg: #e6e4de;
    --dim: #8b8a84;
    --accent: #f7931a;
    --pink: #ec4899;
    --cyan: #06b6d4;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f7931a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  #canvas { display:block; width:100vw; height:100vh; }

  .hud {
    position: fixed; top:20px; left:20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--dim);
    line-height: 1.9;
    pointer-events: none;
  }
  .hud .title {
    color: var(--fg); font-size:13px; font-weight:700;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hud .row { display:flex; gap:10px; }
  .hud .k { color: var(--dim); min-width:96px; }
  .hud .v { color: var(--fg); font-weight:500; }

  .countdown {
    position: fixed; top:20px; left:50%; transform:translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    pointer-events: none;
  }
  .countdown .tag {
    color: var(--dim); font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .countdown .clock {
    color: var(--fg); font-size: 34px; font-weight: 500;
    letter-spacing: 0.06em; font-variant-numeric: tabular-nums;
    text-shadow: 0 0 16px rgba(247,147,26,0.25);
  }

  .legend {
    position: fixed; top:20px; right:20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; line-height: 1.8;
    background: rgba(16,18,22,0.6);
    border: 1px solid #1c1f24;
    padding: 12px 14px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
    pointer-events: auto;
    min-width: 178px;
  }
  .legend .title {
    color: var(--fg); font-size:10px; font-weight:700;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .legend .scale {
    display:flex; gap:2px; margin: 6px 0 4px;
  }
  .legend .scale-step { flex:1; height:8px; border-radius:1px; }
  .legend .scale-caption {
    display:flex; justify-content: space-between;
    color: var(--dim); font-size:10px; letter-spacing: 0.06em;
  }
  .backlink {
    position: fixed; bottom:20px; left:20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim); text-decoration: none;
  }
  .backlink:hover { color: var(--fg); }

  .tagline {
    position: fixed; bottom:20px; right:20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--dim);
    max-width: 240px; text-align: right; line-height:1.6;
  }

  /* Block-found / no-block banner */
  .banner {
    position: fixed; top:50%; left:50%;
    transform: translate(-50%, -50%);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 40px; font-weight: 700; letter-spacing: -0.015em;
    text-align: center; pointer-events: none;
    opacity: 0;
    transition: opacity 320ms ease-out;
    text-shadow: 0 0 32px currentColor;
  }
  .banner.show { opacity: 1; }
  .banner.block-found   { color: var(--green); }
  .banner.no-block      { color: var(--red); }
  .banner .sub {
    display:block; font-family:'IBM Plex Mono',monospace;
    font-size: 13px; font-weight:500; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim);
    margin-top: 8px;
    text-shadow: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud">
  <div class="title">ghost pool · quasar</div>
  <div class="row"><span class="k">pool hashrate</span><span class="v" id="hash">—</span></div>
  <div class="row"><span class="k">shares / sec</span><span class="v" id="sps">—</span></div>
  <div class="row"><span class="k">particles</span><span class="v" id="pcount">—</span></div>
  <div class="row"><span class="k">blocks found</span><span class="v" id="blk">0</span></div>
  <div class="row"><span class="k">missed</span><span class="v" id="missed">0</span></div>
</div>

<div class="countdown">
  <div class="tag">tick tock · next block</div>
  <div class="clock" id="clock">10:00</div>
</div>

<div class="legend">
  <div class="title">quality · leading zeros</div>
  <div class="scale" id="legend-scale"></div>
  <div class="scale-caption"><span>lower</span><span>higher</span></div>
</div>

<a class="backlink" href="/">← back to bitcoinghost</a>
<div class="tagline">
  the wireframe = network difficulty · particles land at their leading-zero radius · if one reaches the surface, we found a block
</div>

<div class="banner" id="banner"><span id="banner-text"></span><span class="sub" id="banner-sub"></span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────────────
// Scene, camera, renderer
// ─────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(14, 8, 18);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 4;
controls.maxDistance = 60;

// ─────────────────────────────────────────────────────────────────────────
// Wireframe sphere = network difficulty target
// ─────────────────────────────────────────────────────────────────────────
const SPHERE_R = 8;
const BASE_SPHERE_COLOR = new THREE.Color(0x3a3f47);
const BLOCK_COLOR   = new THREE.Color('#22c55e');
const MISS_COLOR    = new THREE.Color('#ef4444');

const sphereWire = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.SphereGeometry(SPHERE_R, 48, 24)),
  new THREE.LineBasicMaterial({ color: BASE_SPHERE_COLOR.clone(), transparent: true, opacity: 0.28 })
);
scene.add(sphereWire);

// Core — small bright point, same size as a particle
function makeDotTexture() {
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.3, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.7, 'rgba(255,255,255,0.15)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const dotTex = makeDotTexture();

const coreGeom = new THREE.BufferGeometry();
coreGeom.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0], 3));
const core = new THREE.Points(coreGeom, new THREE.PointsMaterial({
  size: 0.28, color: 0xffffff, transparent: true, opacity: 0.9,
  map: dotTex, blending: THREE.AdditiveBlending, depthWrite: false,
  sizeAttenuation: true,
}));
scene.add(core);

// Axes — subtle orientation markers
const axLen = SPHERE_R * 1.15;
const axMat = new THREE.LineBasicMaterial({ color: 0x2a2e35, transparent: true, opacity: 0.35 });
function axis(a, b) { return new THREE.Line(new THREE.BufferGeometry().setFromPoints([a, b]), axMat); }
scene.add(axis(new THREE.Vector3(-axLen, 0, 0), new THREE.Vector3(axLen, 0, 0)));
scene.add(axis(new THREE.Vector3(0, -axLen, 0), new THREE.Vector3(0, axLen, 0)));
scene.add(axis(new THREE.Vector3(0, 0, -axLen), new THREE.Vector3(0, 0, axLen)));

// ─────────────────────────────────────────────────────────────────────────
// Particle system — hashes flying outward to their quality radius
// ─────────────────────────────────────────────────────────────────────────
const MAX_PARTICLES = 4000;
const particles = [];

const positions = new Float32Array(MAX_PARTICLES * 3);
const colors = new Float32Array(MAX_PARTICLES * 3);
const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
const points = new THREE.Points(geom, new THREE.PointsMaterial({
  size: 0.24, vertexColors: true, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, map: dotTex, sizeAttenuation: true,
}));
scene.add(points);

// Quality gradient — cool→hot by fraction of max zeros
// Stops: deep blue → cyan → green → yellow → orange → red → white-hot
const QUALITY_STOPS = [
  { t: 0.00, c: new THREE.Color('#254c9e') },
  { t: 0.20, c: new THREE.Color('#06b6d4') },
  { t: 0.45, c: new THREE.Color('#22c55e') },
  { t: 0.70, c: new THREE.Color('#f4d03f') },
  { t: 0.88, c: new THREE.Color('#f7931a') },
  { t: 0.97, c: new THREE.Color('#ef4444') },
  { t: 1.00, c: new THREE.Color('#ffffff') },
];
function qualityColor(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 1; i < QUALITY_STOPS.length; i++) {
    const a = QUALITY_STOPS[i-1], b = QUALITY_STOPS[i];
    if (t <= b.t) {
      const u = (t - a.t) / (b.t - a.t);
      const c = a.c.clone().lerp(b.c, u);
      return c;
    }
  }
  return QUALITY_STOPS[QUALITY_STOPS.length-1].c.clone();
}
// Render legend scale
(function renderLegendScale() {
  const el = document.getElementById('legend-scale');
  const n = 24;
  el.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const c = qualityColor(t);
    const d = document.createElement('div');
    d.className = 'scale-step';
    d.style.background = `#${c.getHexString()}`;
    d.style.boxShadow = `0 0 4px rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},0.4)`;
    el.appendChild(d);
  }
})();

// ─────────────────────────────────────────────────────────────────────────
// Emit a share
// ─────────────────────────────────────────────────────────────────────────
// quality ∈ [0,1]: fraction of the way from pool diff to network diff.
// targetRadius = quality * SPHERE_R. When quality >= 1.0 the particle
// reaches the sphere — that's a block.
const PARTICLE_SPEED = SPHERE_R * 0.9;   // units/sec — a bit over 10 s for a 100% hash
function emitShare({ quality }) {
  // Uniform direction on sphere
  let u = 2*Math.random()-1, v = 2*Math.random()-1, s;
  while ((s = u*u + v*v) >= 1) { u = 2*Math.random()-1; v = 2*Math.random()-1; }
  const sq = Math.sqrt(1 - s);
  const dir = new THREE.Vector3(2*u*sq, 2*v*sq, 1 - 2*s);

  const target = Math.min(quality, 1.0) * SPHERE_R;
  const p = {
    pos: new THREE.Vector3(),
    dir,
    target,
    quality,
    isBlock: quality >= 1.0,
    blockClaimed: false,
    age: 0,
    parkedAt: null,
    dwellLife: 3.0 + quality * 4.0,
  };
  particles.push(p);
  if (particles.length > MAX_PARTICLES) particles.shift();
}

// ─────────────────────────────────────────────────────────────────────────
// Share generator
// ─────────────────────────────────────────────────────────────────────────
// Live pool hashrate in TH/s — drives the emission rate.
// This mock value stands in until we wire the real /api/pool feed.
let poolHashrateTh = 4.4;
function samplePoolHashrate() {
  // Wire the real endpoint here when embedding in pool.html
  return poolHashrateTh;
}

// Shares/sec to render ≈ hashrate_th * EMIT_FACTOR (visual density knob).
// At 4 TH/s → 20 particles/sec; at 40 TH/s → 200/sec.
const EMIT_FACTOR = 5;

// Quality distribution: most shares are low-to-mid quality. Exponential
// tail with occasional near-target and very rare block candidates.
function sampleQuality() {
  // 99.5% normal, capped under 0.95
  // 0.5% excellent 0.9–0.99
  // ~0.02% block (quality ≥ 1.0) — extremely rare in mock so demo still sees them
  const r = Math.random();
  if (r < 0.0002) return 1.0 + Math.random() * 0.02;     // block
  if (r < 0.005)  return 0.90 + Math.random() * 0.09;    // excellent-near-miss
  // Exponential with mean ~0.3
  let q = -Math.log(1 - Math.random()) * 0.25;
  if (q > 0.85) q = 0.85;
  return q;
}

let shareEmitAccum = 0;
function tickEmitter(dt) {
  const sharesPerSec = Math.max(0, samplePoolHashrate() * EMIT_FACTOR);
  shareEmitAccum += sharesPerSec * dt;
  while (shareEmitAccum >= 1) {
    emitShare({ quality: sampleQuality() });
    shareEmitAccum -= 1;
    sharesEmittedTotal++;
    spsWindow.push(performance.now());
  }
}

// ─────────────────────────────────────────────────────────────────────────
// Block-found / no-block state machine
// ─────────────────────────────────────────────────────────────────────────
const ROUND_SECONDS = 10 * 60;
const FLASH_SECONDS = 20;

let roundRemaining = ROUND_SECONDS;
let flashState = null;      // null | 'block' | 'miss'
let flashRemaining = 0;

const banner = document.getElementById('banner');
const bannerText = document.getElementById('banner-text');
const bannerSub  = document.getElementById('banner-sub');

function triggerBlockFound() {
  flashState = 'block';
  flashRemaining = FLASH_SECONDS;
  roundRemaining = ROUND_SECONDS;
  blocksFound++;
  bannerText.textContent = 'Block found.';
  bannerSub.textContent = 'ghost pool · we did it';
  banner.className = 'banner block-found show';
}
function triggerNoBlock() {
  flashState = 'miss';
  flashRemaining = FLASH_SECONDS;
  roundRemaining = ROUND_SECONDS;
  blocksMissed++;
  bannerText.textContent = 'No block this round.';
  bannerSub.textContent = 'keep going · next round begins now';
  banner.className = 'banner no-block show';
}
function endFlash() {
  flashState = null;
  banner.classList.remove('show');
  sphereWire.material.color.copy(BASE_SPHERE_COLOR);
  sphereWire.material.opacity = 0.28;
}

function tickRound(dt) {
  if (flashState) {
    flashRemaining -= dt;
    const fade = flashRemaining / FLASH_SECONDS;
    // Pulse sphere colour + opacity
    const target = flashState === 'block' ? BLOCK_COLOR : MISS_COLOR;
    const pulse = 0.55 + Math.sin(performance.now() * 0.004) * 0.2;
    sphereWire.material.color.copy(BASE_SPHERE_COLOR).lerp(target, pulse * fade);
    sphereWire.material.opacity = 0.28 + 0.42 * fade;
    if (flashRemaining <= 0) endFlash();
    return;
  }
  roundRemaining -= dt;
  if (roundRemaining <= 0) triggerNoBlock();
}

function formatClock(secs) {
  secs = Math.max(0, Math.floor(secs));
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ─────────────────────────────────────────────────────────────────────────
// Animation loop
// ─────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let sharesEmittedTotal = 0;
let blocksFound = 0;
let blocksMissed = 0;
const spsWindow = [];

const hud = {
  hash:    document.getElementById('hash'),
  sps:     document.getElementById('sps'),
  pcount:  document.getElementById('pcount'),
  blk:     document.getElementById('blk'),
  missed:  document.getElementById('missed'),
  clock:   document.getElementById('clock'),
};

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);

  tickEmitter(dt);
  tickRound(dt);

  // Advance particles
  let write = 0;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.parkedAt === null) {
      // Travelling outward
      const distTravelled = p.age * PARTICLE_SPEED;
      if (distTravelled < p.target) {
        p.pos.copy(p.dir).multiplyScalar(distTravelled);
      } else {
        p.pos.copy(p.dir).multiplyScalar(p.target);
        p.parkedAt = p.age;
        // Block arrival?
        if (p.isBlock && !p.blockClaimed) {
          p.blockClaimed = true;
          if (!flashState) triggerBlockFound();
        }
      }
    }
    p.age += dt;
    const alive = p.parkedAt === null
      ? true
      : (p.age - p.parkedAt) < p.dwellLife;
    if (alive) particles[write++] = p;
  }
  particles.length = write;

  // Write to buffers
  const posArr = geom.attributes.position.array;
  const colArr = geom.attributes.color.array;
  const n = Math.min(particles.length, MAX_PARTICLES);
  for (let i = 0; i < n; i++) {
    const p = particles[i];
    posArr[i*3]   = p.pos.x;
    posArr[i*3+1] = p.pos.y;
    posArr[i*3+2] = p.pos.z;
    let brightness = 1;
    if (p.parkedAt !== null) {
      const dwellAge = p.age - p.parkedAt;
      brightness = Math.max(0, 1 - dwellAge / p.dwellLife);
    }
    const c = qualityColor(p.quality);
    colArr[i*3]   = c.r * brightness;
    colArr[i*3+1] = c.g * brightness;
    colArr[i*3+2] = c.b * brightness;
  }
  for (let i = n; i < MAX_PARTICLES; i++) {
    posArr[i*3] = 0; posArr[i*3+1] = 0; posArr[i*3+2] = 0;
    colArr[i*3] = 0; colArr[i*3+1] = 0; colArr[i*3+2] = 0;
  }
  geom.attributes.position.needsUpdate = true;
  geom.attributes.color.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);

  // HUD
  const now = performance.now();
  while (spsWindow.length && now - spsWindow[0] > 5000) spsWindow.shift();
  hud.hash.textContent   = samplePoolHashrate().toFixed(2) + ' TH/s';
  hud.sps.textContent    = (spsWindow.length / 5).toFixed(1);
  hud.pcount.textContent = particles.length.toString();
  hud.blk.textContent    = blocksFound.toString();
  hud.missed.textContent = blocksMissed.toString();
  hud.clock.textContent  = flashState ? '—' : formatClock(roundRemaining);

  requestAnimationFrame(animate);
}

// ─────────────────────────────────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// Go
animate();
</script>
</body>
</html>
