# Nginx configuration for get.bitcoinghost.org
# Install scripts server
#
# To install:
# 1. Copy this to /etc/nginx/sites-available/get.bitcoinghost.org
# 2. ln -s /etc/nginx/sites-available/get.bitcoinghost.org /etc/nginx/sites-enabled/
# 3. Copy the get/ folder contents to /var/www/get.bitcoinghost.org/
# 4. Run: sudo certbot --nginx -d get.bitcoinghost.org
# 5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name get.bitcoinghost.org;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name get.bitcoinghost.org;

    # SSL certificates (will be added by certbot)
    ssl_certificate /etc/letsencrypt/live/get.bitcoinghost.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/get.bitcoinghost.org/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Document root
    root /var/www/get.bitcoinghost.org;

    # Logging
    access_log /var/log/nginx/get.bitcoinghost.org.access.log;
    error_log /var/log/nginx/get.bitcoinghost.org.error.log;

    # Default - serve as plain text (for curl)
    location / {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header X-Content-Type-Options nosniff;

        # Cache for 1 hour
        add_header Cache-Control "public, max-age=3600";
    }

    # Install scripts
    location = /install.sh {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header X-Content-Type-Options nosniff;
    }

    location = /wallet.sh {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header X-Content-Type-Options nosniff;
    }

    # Signature files
    location ~* \.sig$ {
        default_type application/pgp-signature;
    }

    # SHA256 checksum files
    location ~* \.sha256$ {
        default_type text/plain;
    }

    # GPG public key
    location = /keys/release.asc {
        default_type application/pgp-keys;
        add_header Content-Disposition "attachment; filename=release.asc";
    }

    # Checkpoint files (manifest, headers, bloom, UTXO chunks)
    location /checkpoint/ {
        alias /var/www/get.bitcoinghost.org/checkpoint/;
        autoindex off;
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=86400";

        # manifest.bin - small, cache briefly (changes with each new checkpoint)
        location = /checkpoint/manifest.bin {
            alias /var/www/get.bitcoinghost.org/checkpoint/manifest.bin;
            default_type application/octet-stream;
            add_header Cache-Control "public, max-age=3600";
        }

        # latest.json - metadata endpoint
        location = /checkpoint/latest.json {
            alias /var/www/get.bitcoinghost.org/checkpoint/latest.json;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # Health check
    location = /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
