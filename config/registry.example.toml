#
# Ghost Registry Configuration
#
# This service receives registrations from ghost-pool nodes and manages
# Cloudflare DNS records for geographic load balancing.
#
# Copy this file to /etc/ghost/registry.toml and customize.

[server]
# Listen address for the HTTP API
listen = "0.0.0.0:8333"
# Request timeout in seconds
request_timeout_secs = 30
# Maximum request body size in bytes
max_body_size = 1048576  # 1MB

[cloudflare]
# Enable Cloudflare DNS integration
enabled = true
# Cloudflare Zone ID (from Cloudflare dashboard)
zone_id = "your_zone_id_here"
# API token with DNS edit permissions
# Use environment variable for security: ${CLOUDFLARE_API_TOKEN}
api_token = "${CLOUDFLARE_API_TOKEN}"
# Base domain for pool DNS records
base_domain = "bitcoinghost.org"

[dns]
# TTL for DNS A records (seconds) - low for fast failover
ttl_seconds = 60
# Maximum healthy nodes per region to include in DNS
max_nodes_per_region = 3
# How often to update DNS records (seconds)
update_interval_secs = 60
# Subdomain prefix (e.g., "pool" creates "eu.pool.bitcoinghost.org")
subdomain_prefix = "pool"

[health]
# Heartbeat timeout - node marked unhealthy after this (seconds)
heartbeat_timeout_secs = 90
# Number of missed heartbeats before node removal
missed_heartbeats_threshold = 3
# Health check interval (seconds)
check_interval_secs = 30
# Maximum load percentage before deprioritizing a node
max_load_percent = 80
# Rate limit: minimum seconds between registrations from same node
registration_rate_limit_secs = 300
# Maximum timestamp drift allowed (seconds) - API-4: reduced to 30s to minimize replay window
max_timestamp_drift_secs = 30

[database]
# SQLite database path
path = "/var/lib/ghost-registry/registry.db"
# Enable WAL mode for better performance
wal_mode = true
