# =============================================================================
# Bitcoin Ghost - Mainnet Private Solo Mining Configuration
# =============================================================================
#
# Configuration for private solo mining (single operator, own hardware).
# 99% of block rewards go to your address, 1% pool fee.
# Not registered in DNS - requires direct connection with password.
#
# =============================================================================

[identity]
key_path = "/etc/ghost/node.key"
display_name = "Solo Miner"

[bitcoin]
rpc_host = "127.0.0.1"
rpc_port = 8332
rpc_user = "${BITCOIN_RPC_USER:-ghostrpc}"
rpc_password = "${BITCOIN_RPC_PASSWORD}"
network = "mainnet"
zmq_hashblock = "tcp://127.0.0.1:28332"
zmq_hashtx = "tcp://127.0.0.1:28333"

[network]
# For solo mining, public_address can be local or LAN address
public_address = "${PUBLIC_ADDRESS:-127.0.0.1}"
sv2_port = 34255
sv1_port = 3333
http_port = 8080
max_miners = 100

# SOLO MINING MODE - requires password, 99% to your address
mining_mode = "private_solo"           # Options: public_pool | private_pool | private_solo
public_mining = false                  # Not discoverable via DNS
private_mining_password = "${PRIVATE_MINING_PASSWORD}"  # REQUIRED - min 8 chars
solo_payout_address = "${SOLO_PAYOUT_ADDRESS}"          # REQUIRED - your bc1... address

# Security still required for mainnet
internal_api_secret = "${INTERNAL_API_SECRET}"
noise_enabled = true

# No seed nodes needed for solo operation
seed_nodes = []

[network.p2p]
share_propagation = 8555
block_announcement = 8556
consensus_voting = 8557
health_monitoring = 8558
discovery = 8559
elder_management = 8560
payout_proposal = 8561
payout_transaction = 8562

[policy]
profile = "bitcoin_pure"

[storage]
db_path = "/var/lib/ghost/data"
wal_mode = true
archive_mode = false  # Solo miners don't need archive
prune_height = 1000   # Keep ~1 week of data

[pool]
# Treasury still receives 1% fee
treasury_address = "${TREASURY_ADDRESS}"
treasury_fee_percent = 1.0
min_payout_sats = 10000  # Lower threshold for solo
payout_interval_blocks = 10  # Faster payouts for solo

[ghost_pay]
enabled = false  # Solo miners typically don't need L2
