<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wraith Wallet</title>
    <style>
      :root {
        --bg: #0e0f12;
        --panel: #181a1f;
        --border: #232328;
        --border-soft: #1c1d22;
        --fg: #d8d8d8;
        --fg-mute: #9ca3af;
        --accent: #1d4ed8;
        --accent-hover: #1e3a8a;
        --pass: #4ade80;
        --fail: #f87171;
        --skip: #9ca3af;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      header .title {
        font-weight: 600;
        font-size: 15px;
      }
      header .spacer { flex: 1; }
      header .status {
        color: var(--fg-mute);
        font-size: 12px;
      }
      nav {
        display: flex;
        gap: 4px;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
      }
      nav button {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--fg-mute);
        padding: 10px 14px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      nav button.active {
        color: var(--fg);
        border-bottom-color: var(--accent);
      }
      main {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .row { display: flex; gap: 12px; align-items: center; }
      .col { display: flex; flex-direction: column; gap: 8px; }
      label { font-size: 12px; color: var(--fg-mute); }
      input, select {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--fg);
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        font-size: 13px;
        min-width: 160px;
      }
      button.primary {
        background: var(--accent);
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button.primary:hover { background: var(--accent-hover); }
      button.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg);
        padding: 6px 12px;
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      button.ghost:hover { background: var(--panel); }
      pre {
        background: var(--panel);
        padding: 12px;
        border-radius: 6px;
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        font-size: 12px;
        color: #c8c8c8;
        overflow: auto;
        margin: 0;
        max-height: 200px;
      }
      .check {
        display: grid;
        grid-template-columns: 80px 160px 1fr;
        gap: 12px;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border-soft);
      }
      .pass { color: var(--pass); font-weight: 600; }
      .fail { color: var(--fail); font-weight: 600; }
      .skip { color: var(--skip); font-weight: 600; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }
      .hide { display: none !important; }
      .balance { font-size: 28px; font-weight: 600; }
      .balance .units { font-size: 14px; color: var(--fg-mute); margin-left: 6px; }
      .addr {
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        word-break: break-all;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
      }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      th { color: var(--fg-mute); font-weight: 500; font-size: 12px; }
      .err {
        background: #2a1517;
        border: 1px solid #5a2125;
        color: #fca5a5;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
      }
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        min-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .modal h3 { margin: 0; font-size: 14px; font-weight: 600; }
      .modal .row { justify-content: flex-end; }
      .modal.wide { min-width: 500px; max-width: 540px; }
      .mnemonic {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        font-size: 13px;
        line-height: 1.6;
        word-spacing: 6px;
        user-select: all;
      }
      .checkbox {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        color: var(--fg-mute);
      }
      .step-hint {
        color: var(--fg-mute);
        font-size: 12px;
        margin: 0;
      }
      .danger {
        color: #fca5a5;
        font-size: 12px;
      }
      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        background: #143822;
        border: 1px solid #1f5d39;
        color: #bbf7d0;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 13px;
        z-index: 50;
        animation: toast-in 0.2s ease-out;
      }
      @keyframes toast-in {
        from { transform: translateY(20px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">Wraith Wallet</div>
      <select id="wallet-picker"></select>
      <button class="ghost" id="wallet-unlock-btn">unlock</button>
      <button class="ghost" id="wallet-lock-btn">lock</button>
      <button class="ghost" id="wallet-new-btn">+ new</button>
      <button class="ghost" id="wallet-import-btn">+ restore</button>
      <div class="spacer"></div>
      <div class="status" id="status">connecting...</div>
    </header>
    <nav>
      <button data-tab="home" class="active">home</button>
      <button data-tab="receive">receive</button>
      <button data-tab="send">send</button>
      <button data-tab="locks">locks</button>
      <button data-tab="identity">identity</button>
      <button data-tab="history">history</button>
      <button data-tab="doctor">doctor</button>
      <button data-tab="settings">settings</button>
    </nav>
    <main>
      <div id="err" class="err hide"></div>

      <!-- HOME -->
      <section data-view="home" class="col">
        <div class="panel">
          <label>balance (active wallet)</label>
          <div id="balance" class="balance">— <span class="units">sats</span></div>
          <div style="margin-top: 10px;">
            <button class="ghost" id="balance-refresh">refresh</button>
          </div>
        </div>
      </section>

      <!-- RECEIVE -->
      <section data-view="receive" class="col hide">
        <div class="panel col">
          <label>derive address at index</label>
          <div class="row">
            <input type="number" id="receive-index" value="0" min="0" />
            <button class="primary" id="receive-go">show</button>
          </div>
          <div id="receive-out"></div>
        </div>
      </section>

      <!-- SEND -->
      <section data-view="send" class="col hide">
        <div class="panel col">
          <div class="col">
            <label>recipient</label>
            <input id="send-to" placeholder="bc1q… / sp… / l2:…" />
          </div>
          <div class="row">
            <div class="col" style="flex: 1;">
              <label>amount (sats)</label>
              <input type="number" id="send-amount" min="1" />
            </div>
            <div class="col">
              <label>mode</label>
              <select id="send-mode">
                <option value="onchain">onchain</option>
                <option value="l2">l2</option>
                <option value="silent">silent</option>
              </select>
            </div>
          </div>
          <div class="col">
            <label>memo (optional)</label>
            <input id="send-memo" />
          </div>
          <div>
            <button class="primary" id="send-go">send</button>
          </div>
          <div id="send-out"></div>
        </div>
      </section>

      <!-- LOCKS -->
      <section data-view="locks" class="col hide">
        <div class="panel">
          <div class="row" style="margin-bottom: 8px;">
            <button class="primary" id="locks-prepare-btn">+ prepare lock</button>
            <button class="ghost" id="locks-refresh">refresh</button>
            <span id="locks-total" style="margin-left:auto; color: var(--fg-mute); font-size: 12px;"></span>
          </div>
          <table>
            <thead>
              <tr>
                <th>id</th>
                <th>status</th>
                <th>capacity</th>
                <th>balance</th>
                <th>denom</th>
                <th>funding</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="locks-body"></tbody>
          </table>
        </div>
      </section>

      <!-- IDENTITY -->
      <section data-view="identity" class="col hide">
        <div class="panel col">
          <label>Ghost ID (silent-payment receive identity)</label>
          <div id="identity-ghost-id" class="addr">—</div>
          <label>Scan public key</label>
          <div id="identity-scan-key" class="addr">—</div>
          <label>Spend public key</label>
          <div id="identity-spend-key" class="addr">—</div>
          <div style="height: 8px;"></div>
          <label>GSP session</label>
          <div id="identity-session" class="addr">no session — run gsp auth first</div>
          <div class="row">
            <button class="primary" id="identity-gsp-auth">authenticate with gsp</button>
            <button class="ghost" id="identity-register-scan">register scan key</button>
            <button class="ghost" id="identity-refresh">refresh</button>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section data-view="history" class="col hide">
        <div class="panel">
          <div class="row" style="margin-bottom: 8px;">
            <button class="ghost" id="history-refresh">refresh</button>
          </div>
          <table>
            <thead>
              <tr><th>height</th><th>direction</th><th>amount</th><th>txid</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </section>

      <!-- DOCTOR -->
      <section data-view="doctor" class="col hide">
        <div class="panel">
          <div class="row" style="margin-bottom: 8px;">
            <button class="ghost" id="doctor-refresh">re-run</button>
          </div>
          <div id="doctor-checks"></div>
        </div>
      </section>

      <!-- SETTINGS -->
      <section data-view="settings" class="col hide">
        <div class="panel col">
          <p class="step-hint">
            Read-only snapshot of the environment <code>wraithd</code> was started with.
            To change anything here, set the matching <code>WRAITHD_*</code> env var
            and restart the daemon.
          </p>
          <table>
            <tbody id="settings-body"></tbody>
          </table>
          <div class="row">
            <button class="ghost" id="settings-refresh">refresh</button>
          </div>
        </div>
      </section>

      <pre id="raw"></pre>
    </main>

    <div id="modal-root"></div>

    <script type="module">
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const $ = (s) => document.querySelector(s);
      const els = {
        status: $("#status"),
        err: $("#err"),
        raw: $("#raw"),
        picker: $("#wallet-picker"),
        balance: $("#balance"),
        receiveIndex: $("#receive-index"),
        receiveOut: $("#receive-out"),
        sendTo: $("#send-to"),
        sendAmount: $("#send-amount"),
        sendMode: $("#send-mode"),
        sendMemo: $("#send-memo"),
        sendOut: $("#send-out"),
        historyBody: $("#history-body"),
        doctorChecks: $("#doctor-checks"),
      };

      function showErr(msg) {
        els.err.textContent = msg;
        els.err.classList.remove("hide");
      }
      function clearErr() {
        els.err.classList.add("hide");
        els.err.textContent = "";
      }
      function showRaw(label, value) {
        els.raw.textContent = label + "\n" + JSON.stringify(value, null, 2);
      }

      let healthDownLast = null; // null = no probe yet, true/false otherwise
      async function refreshHealth() {
        try {
          const v = await invoke("daemon_health");
          els.status.textContent = `daemon v${v.daemon_version} · uptime ${v.uptime_secs}s`;
          // Recovery edge: if the daemon was unreachable on the previous probe
          // and is reachable now, refresh the panels that depend on it. Cheap
          // self-healing UX — the user doesn't have to click around to figure
          // out the panels are stale.
          if (healthDownLast === true) {
            clearErr();
            refreshWalletList();
            refreshBalance();
          }
          healthDownLast = false;
        } catch (e) {
          els.status.textContent = "daemon not reachable";
          // Only spam the error banner on the first transition into "down".
          if (healthDownLast !== true) {
            showErr(String(e));
          }
          healthDownLast = true;
        }
      }

      async function refreshWalletList() {
        try {
          const v = await invoke("wallet_list");
          const wallets = v.wallets || [];
          els.picker.innerHTML = "";
          let activeName = null;
          for (const w of wallets) {
            const opt = document.createElement("option");
            opt.value = w.name;
            const flags = [
              w.unlocked ? "unlocked" : "locked",
              w.active ? "active" : null,
            ].filter(Boolean).join(", ");
            opt.textContent = `${w.name} (${flags})`;
            if (w.active) activeName = w.name;
            els.picker.append(opt);
          }
          // Reflect the daemon's active-wallet selection in the picker.
          if (activeName) els.picker.value = activeName;
        } catch (e) {
          showErr(String(e));
        }
      }

      // Switch the active wallet whenever the user changes the picker.
      // The daemon already enforces "must be unlocked to be active" — we
      // surface the error in the banner if it kicks back.
      async function onPickerChange() {
        const name = els.picker.value;
        if (!name) return;
        try {
          await invoke("wallet_select", { name });
          await refreshWalletList();
          await refreshBalance();
          // Refresh whichever tab the user is currently looking at, since
          // its data is wallet-scoped.
          const active = document.querySelector("nav button.active")?.dataset.tab;
          if (active === "history") refreshHistory();
          if (active === "locks") refreshLocks();
          if (active === "identity") refreshIdentity();
        } catch (e) {
          showErr(`select wallet: ${e}`);
        }
      }

      async function refreshBalance() {
        try {
          const v = await invoke("light_balance");
          const sats = v.confirmed_sats ?? 0;
          els.balance.firstChild.nodeValue = Number(sats).toLocaleString() + " ";
          showRaw("light_balance", v);
        } catch (e) {
          els.balance.firstChild.nodeValue = "— ";
          showRaw("light_balance (error)", e);
        }
      }

      async function showAddress() {
        clearErr();
        try {
          const idx = Number(els.receiveIndex.value || 0);
          const v = await invoke("light_receive", { index: idx });
          const addr = v.address || "?";
          els.receiveOut.innerHTML = "";
          const div = document.createElement("div");
          div.className = "addr";
          div.textContent = addr;
          els.receiveOut.append(div);
          showRaw("light_receive", v);
        } catch (e) {
          showErr(String(e));
        }
      }

      async function sendPayment() {
        clearErr();
        try {
          const v = await invoke("light_send", {
            recipient: els.sendTo.value,
            amountSats: Number(els.sendAmount.value || 0),
            mode: els.sendMode.value,
            memo: els.sendMemo.value || null,
          });
          els.sendOut.innerHTML = "";
          const ok = document.createElement("div");
          ok.className = "addr";
          ok.textContent = JSON.stringify(v, null, 2);
          els.sendOut.append(ok);
          showRaw("light_send", v);
        } catch (e) {
          showErr(String(e));
        }
      }

      async function refreshHistory() {
        clearErr();
        try {
          const v = await invoke("light_history", { limit: 50, offset: 0 });
          const items = v.items || [];
          els.historyBody.innerHTML = "";
          for (const it of items) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${it.block_height ?? "—"}</td><td>${it.direction ?? "—"}</td><td>${(it.amount_sats ?? 0).toLocaleString()}</td><td style="font-family:ui-monospace;font-size:11px;">${it.txid ?? ""}</td>`;
            els.historyBody.append(tr);
          }
          if (items.length === 0) {
            els.historyBody.innerHTML = `<tr><td colspan="4" style="color:#9ca3af;">no transactions yet</td></tr>`;
          }
          showRaw("light_history", v);
        } catch (e) {
          showErr(String(e));
        }
      }

      async function refreshDoctor() {
        try {
          const v = await invoke("daemon_doctor");
          els.doctorChecks.innerHTML = "";
          const checks = v.checks || [];
          for (const c of checks) {
            const row = document.createElement("div");
            row.className = "check";
            const status = document.createElement("span");
            status.className = c.status;
            status.textContent = (c.status || "").toUpperCase();
            const name = document.createElement("span");
            name.textContent = c.name;
            const detail = document.createElement("span");
            detail.textContent = c.detail || "";
            detail.style.color = "#9ca3af";
            row.append(status, name, detail);
            els.doctorChecks.append(row);
          }
          showRaw("daemon_doctor", v);
        } catch (e) {
          showErr(String(e));
        }
      }

      // Generic in-window modal builder. Returns a Promise that resolves to
      // whatever value the caller passes to `done()` from inside `build()`.
      // build() receives the modal root node + a `done(value)` callback.
      function modal(build) {
        return new Promise((resolve) => {
          const root = $("#modal-root");
          const bg = document.createElement("div");
          bg.className = "modal-bg";
          const m = document.createElement("div");
          m.className = "modal wide";
          bg.append(m);
          root.append(bg);

          function done(value) {
            root.removeChild(bg);
            resolve(value);
          }
          build(m, done);
        });
      }

      // Restore-from-mnemonic flow. Lives alongside onboarding so users with
      // an existing seed don't have to drop to the CLI on first run.
      async function importFlow() {
        clearErr();
        let existing = [];
        try {
          const v = await invoke("wallet_list");
          existing = v.wallets || [];
        } catch (e) {
          showErr(String(e));
          return;
        }
        const data = await modal((m, done) => {
          const h = document.createElement("h3");
          h.textContent = "Restore from mnemonic";
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            "Paste your 12 or 24 BIP-39 words. They are sent to the local daemon over " +
            "an owner-only Unix socket; nothing leaves this machine.";
          const nameLabel = document.createElement("label");
          nameLabel.textContent = "wallet name";
          const name = document.createElement("input");
          name.placeholder = "default";
          const seedLabel = document.createElement("label");
          seedLabel.textContent = "mnemonic";
          const seed = document.createElement("input");
          seed.type = "password";
          seed.placeholder = "twelve or twenty-four words separated by spaces";
          const passLabel = document.createElement("label");
          passLabel.textContent = "new passphrase (min 12 chars)";
          const pass = document.createElement("input");
          pass.type = "password";
          const confirmLabel = document.createElement("label");
          confirmLabel.textContent = "confirm passphrase";
          const confirm = document.createElement("input");
          confirm.type = "password";
          const errLine = document.createElement("div");
          errLine.className = "danger";
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "restore";
          row.append(cancel, ok);
          m.append(h, hint, nameLabel, name, seedLabel, seed, passLabel, pass, confirmLabel, confirm, errLine, row);
          setTimeout(() => name.focus(), 0);

          function submit() {
            const n = name.value.trim() || "default";
            const words = seed.value.trim().split(/\s+/).filter(Boolean);
            if (existing.some((w) => w.name === n)) {
              errLine.textContent = `wallet "${n}" already exists`;
              return;
            }
            if (words.length !== 12 && words.length !== 24) {
              errLine.textContent = `expected 12 or 24 words, got ${words.length}`;
              return;
            }
            if (pass.value.length < 12) {
              errLine.textContent = "passphrase must be at least 12 characters";
              return;
            }
            if (pass.value !== confirm.value) {
              errLine.textContent = "passphrases don't match";
              return;
            }
            done({ name: n, mnemonic: words.join(" "), passphrase: pass.value });
          }
          cancel.addEventListener("click", () => done(null));
          ok.addEventListener("click", submit);
          [name, seed, pass, confirm].forEach((el) => {
            el.addEventListener("keydown", (e) => {
              if (e.key === "Enter") submit();
              if (e.key === "Escape") done(null);
            });
          });
        });
        if (!data) return;
        try {
          await invoke("wallet_import", data);
        } catch (e) {
          showErr(`import: ${e}`);
          return;
        }
        try {
          await invoke("wallet_unlock", { name: data.name, passphrase: data.passphrase });
          await invoke("wallet_select", { name: data.name });
        } catch (e) {
          showErr(`unlock imported wallet: ${e}`);
        }
        await refreshWalletList();
        await refreshBalance();
        showToast(`Wallet "${data.name}" restored.`);
      }

      // Step A: collect name + passphrase. Resolves to {name, passphrase} or null.
      async function onboardingCollectCredentials(existingWallets) {
        return modal((m, done) => {
          const heading = existingWallets.length === 0
            ? "Create your first wallet"
            : "Create a new wallet";
          const h = document.createElement("h3");
          h.textContent = heading;
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            "wraithd will generate a fresh BIP-39 mnemonic and encrypt it with " +
            "Argon2id + AES-256-GCM under the passphrase you choose.";
          const nameLabel = document.createElement("label");
          nameLabel.textContent = "wallet name";
          const name = document.createElement("input");
          name.placeholder = "default";
          const passLabel = document.createElement("label");
          passLabel.textContent = "passphrase (min 12 chars)";
          const pass = document.createElement("input");
          pass.type = "password";
          const confirmLabel = document.createElement("label");
          confirmLabel.textContent = "confirm passphrase";
          const confirm = document.createElement("input");
          confirm.type = "password";
          const errLine = document.createElement("div");
          errLine.className = "danger";
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "create";
          row.append(cancel, ok);
          m.append(h, hint, nameLabel, name, passLabel, pass, confirmLabel, confirm, errLine, row);
          setTimeout(() => name.focus(), 0);

          function submit() {
            const n = name.value.trim() || "default";
            if (existingWallets.some((w) => w.name === n)) {
              errLine.textContent = `wallet "${n}" already exists`;
              return;
            }
            if (pass.value.length < 12) {
              errLine.textContent = "passphrase must be at least 12 characters";
              return;
            }
            if (pass.value !== confirm.value) {
              errLine.textContent = "passphrases don't match";
              return;
            }
            done({ name: n, passphrase: pass.value });
          }
          cancel.addEventListener("click", () => done(null));
          ok.addEventListener("click", submit);
          [name, pass, confirm].forEach((el) => {
            el.addEventListener("keydown", (e) => {
              if (e.key === "Enter") submit();
              if (e.key === "Escape") done(null);
            });
          });
        });
      }

      // Step B: show the mnemonic and require explicit confirmation that the
      // user has written it down. Resolves to true on confirm, false on cancel.
      async function onboardingShowMnemonic(name, passphrase) {
        let mnemonic;
        try {
          const v = await invoke("wallet_show_mnemonic", { name, passphrase });
          mnemonic = v.mnemonic;
        } catch (e) {
          showErr(`reveal mnemonic: ${e}`);
          return false;
        }
        return modal((m, done) => {
          const h = document.createElement("h3");
          h.textContent = "Back up your mnemonic";
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            "Write these 12 words down on paper. Anyone with this mnemonic can spend " +
            "all of your funds — wraithd cannot recover it for you.";
          const seed = document.createElement("div");
          seed.className = "mnemonic";
          seed.textContent = mnemonic;
          const copyBtn = document.createElement("button");
          copyBtn.className = "ghost";
          copyBtn.textContent = "copy to clipboard";
          copyBtn.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(mnemonic);
              copyBtn.textContent = "copied — clear the clipboard once you've saved it";
            } catch {
              copyBtn.textContent = "clipboard access denied";
            }
          });
          const checkbox = document.createElement("label");
          checkbox.className = "checkbox";
          const cb = document.createElement("input");
          cb.type = "checkbox";
          const cbText = document.createElement("span");
          cbText.textContent =
            "I have written down all 12 words and stored them somewhere safe.";
          checkbox.append(cb, cbText);
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "later";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "continue";
          ok.disabled = true;
          cb.addEventListener("change", () => {
            ok.disabled = !cb.checked;
          });
          row.append(cancel, ok);
          m.append(h, hint, seed, copyBtn, checkbox, row);
          cancel.addEventListener("click", () => done(false));
          ok.addEventListener("click", () => done(true));
        });
      }

      async function onboardingFlow() {
        clearErr();
        let existing = [];
        try {
          const v = await invoke("wallet_list");
          existing = v.wallets || [];
        } catch (e) {
          showErr(String(e));
          return;
        }
        const creds = await onboardingCollectCredentials(existing);
        if (!creds) return;
        try {
          await invoke("wallet_create", { name: creds.name, passphrase: creds.passphrase });
        } catch (e) {
          showErr(`create wallet: ${e}`);
          return;
        }
        const confirmed = await onboardingShowMnemonic(creds.name, creds.passphrase);
        if (!confirmed) {
          // User can come back to "wallet show-mnemonic" via the CLI; we don't
          // delete the wallet on cancel, just leave it locked.
          await refreshWalletList();
          return;
        }
        try {
          await invoke("wallet_unlock", { name: creds.name, passphrase: creds.passphrase });
          await invoke("wallet_select", { name: creds.name });
        } catch (e) {
          showErr(`unlock new wallet: ${e}`);
        }
        await refreshWalletList();
        await refreshBalance();
        showToast(`Wallet "${creds.name}" ready.`);
      }

      function passphraseDialog(walletName) {
        // Replaces window.prompt(): keystrokes are masked, the event loop
        // doesn't freeze (which prompt() does on some Linux WebKit builds),
        // and Esc cancels cleanly.
        return new Promise((resolve) => {
          const root = $("#modal-root");
          const bg = document.createElement("div");
          bg.className = "modal-bg";
          const m = document.createElement("div");
          m.className = "modal";
          const h = document.createElement("h3");
          h.textContent = `Unlock ${walletName}`;
          const input = document.createElement("input");
          input.type = "password";
          input.placeholder = "passphrase";
          input.autofocus = true;
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "unlock";
          row.append(cancel, ok);
          m.append(h, input, row);
          bg.append(m);
          root.append(bg);
          setTimeout(() => input.focus(), 0);

          function done(value) {
            root.removeChild(bg);
            resolve(value);
          }
          cancel.addEventListener("click", () => done(null));
          ok.addEventListener("click", () => done(input.value));
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") done(input.value);
            if (e.key === "Escape") done(null);
          });
        });
      }

      async function doUnlock() {
        clearErr();
        const name = els.picker.value;
        if (!name) {
          showErr("no wallet selected; create one with `wraith wallet create` first");
          return;
        }
        const passphrase = await passphraseDialog(name);
        if (passphrase == null) return;
        try {
          await invoke("wallet_unlock", { name, passphrase });
          await invoke("wallet_select", { name });
          await refreshWalletList();
          await refreshBalance();
        } catch (e) {
          showErr(String(e));
        }
      }
      async function doLock() {
        clearErr();
        const name = els.picker.value || null;
        try {
          await invoke("wallet_lock", { name });
          await refreshWalletList();
        } catch (e) {
          showErr(String(e));
        }
      }

      // Tab switcher with localStorage persistence — re-opening the GUI lands
      // the user back on the tab they were last using.
      const TAB_KEY = "wraith.lastTab";
      function selectTab(tab) {
        document.querySelectorAll("nav button").forEach((x) => {
          x.classList.toggle("active", x.dataset.tab === tab);
        });
        document.querySelectorAll("[data-view]").forEach((v) => {
          v.classList.toggle("hide", v.dataset.view !== tab);
        });
        try { localStorage.setItem(TAB_KEY, tab); } catch {}
        if (tab === "history") refreshHistory();
        if (tab === "doctor") refreshDoctor();
        if (tab === "locks") refreshLocks();
        if (tab === "identity") refreshIdentity();
        if (tab === "settings") refreshSettings();
      }
      document.querySelectorAll("nav button").forEach((b) => {
        b.addEventListener("click", () => selectTab(b.dataset.tab));
      });

      async function refreshLocks() {
        clearErr();
        const tbody = $("#locks-body");
        const total = $("#locks-total");
        try {
          const v = await invoke("locks_list");
          const locks = v.locks || [];
          total.textContent =
            `total locked: ${(v.total_locked_sats || 0).toLocaleString()} sat`;
          tbody.innerHTML = "";
          if (locks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color:#9ca3af;">no locks yet — prepare one to get started</td></tr>`;
            return;
          }
          for (const l of locks) {
            const tr = document.createElement("tr");
            const idShort = l.lock_id ? l.lock_id.slice(0, 12) + "…" : "—";
            const fundShort = l.funding_address
              ? l.funding_address.slice(0, 10) + "…" + l.funding_address.slice(-6)
              : "—";
            const cap = (l.capacity_sats ?? 0).toLocaleString();
            const bal = (l.balance_sats ?? 0).toLocaleString();
            const status = (l.status || "").toLowerCase();
            tr.innerHTML = `
              <td title="${l.lock_id}" style="font-family:ui-monospace;font-size:11px;">${idShort}</td>
              <td>${status}</td>
              <td>${cap}</td>
              <td>${bal}</td>
              <td>${l.denomination ?? ""}</td>
              <td title="${l.funding_address ?? ""}" style="font-family:ui-monospace;font-size:11px;">${fundShort}</td>
              <td></td>
            `;
            const actions = tr.lastElementChild;
            // Show "confirm" + "jump" controls based on status. We're conservative:
            // anything not obviously settled gets a confirm button; jump is offered
            // for active locks.
            if (!l.funding_txid) {
              const btn = document.createElement("button");
              btn.className = "ghost";
              btn.textContent = "confirm";
              btn.addEventListener("click", () => confirmLockFlow(l));
              actions.append(btn);
            } else {
              const btn = document.createElement("button");
              btn.className = "ghost";
              btn.textContent = "jump";
              btn.addEventListener("click", () => jumpLockFlow(l));
              actions.append(btn);
            }
            tbody.append(tr);
          }
        } catch (e) {
          showErr(`locks: ${e}`);
        }
      }

      async function prepareLockFlow() {
        clearErr();
        const data = await modal((m, done) => {
          const h = document.createElement("h3");
          h.textContent = "Prepare a new lock";
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            "Choose a capacity. After GSP allocates the lock you'll get a funding address — " +
            "send the exact required amount to it from your normal wallet, then come back and confirm.";
          const capLabel = document.createElement("label");
          capLabel.textContent = "capacity (sats)";
          const cap = document.createElement("input");
          cap.type = "number";
          cap.min = "1000";
          cap.value = "100000";
          const errLine = document.createElement("div");
          errLine.className = "danger";
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "prepare";
          row.append(cancel, ok);
          m.append(h, hint, capLabel, cap, errLine, row);
          setTimeout(() => cap.focus(), 0);
          ok.addEventListener("click", () => {
            const n = Number(cap.value);
            if (!Number.isFinite(n) || n <= 0) {
              errLine.textContent = "capacity must be a positive number";
              return;
            }
            done({ capacity_sats: n });
          });
          cancel.addEventListener("click", () => done(null));
        });
        if (!data) return;
        try {
          const v = await invoke("locks_prepare", data);
          await modal((m, done) => {
            const h = document.createElement("h3");
            h.textContent = "Lock prepared — fund it";
            const p = document.createElement("p");
            p.className = "step-hint";
            p.innerHTML =
              `Send <b>${(v.required_sats || 0).toLocaleString()}</b> sat to the address below, ` +
              "then return and click confirm on this lock's row.";
            const addr = document.createElement("div");
            addr.className = "addr";
            addr.textContent = v.funding_address;
            const idLine = document.createElement("p");
            idLine.className = "step-hint";
            idLine.textContent = `lock_id: ${v.lock_id}`;
            const row = document.createElement("div");
            row.className = "row";
            const close = document.createElement("button");
            close.className = "primary";
            close.textContent = "got it";
            close.addEventListener("click", () => done(true));
            row.append(close);
            m.append(h, p, addr, idLine, row);
          });
          await refreshLocks();
        } catch (e) {
          showErr(`prepare lock: ${e}`);
        }
      }

      async function confirmLockFlow(lock) {
        clearErr();
        const data = await modal((m, done) => {
          const h = document.createElement("h3");
          h.textContent = "Confirm lock funding";
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            `Paste the txid of your funding payment to ${lock.funding_address}.`;
          const txLabel = document.createElement("label");
          txLabel.textContent = "funding txid";
          const tx = document.createElement("input");
          tx.placeholder = "64-character hex";
          const errLine = document.createElement("div");
          errLine.className = "danger";
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "confirm";
          row.append(cancel, ok);
          m.append(h, hint, txLabel, tx, errLine, row);
          setTimeout(() => tx.focus(), 0);
          ok.addEventListener("click", () => {
            const t = tx.value.trim();
            if (!/^[0-9a-fA-F]{64}$/.test(t)) {
              errLine.textContent = "expected 64 hex characters";
              return;
            }
            done({ lock_id: lock.lock_id, funding_txid: t });
          });
          cancel.addEventListener("click", () => done(null));
        });
        if (!data) return;
        try {
          await invoke("locks_confirm", data);
          showToast("Lock confirmed.");
          await refreshLocks();
        } catch (e) {
          showErr(`confirm lock: ${e}`);
        }
      }

      async function jumpLockFlow(lock) {
        clearErr();
        const data = await modal((m, done) => {
          const h = document.createElement("h3");
          h.textContent = "Jump (rotate) lock";
          const hint = document.createElement("p");
          hint.className = "step-hint";
          hint.textContent =
            "A lock jump moves the unspent capacity to a new key under your control. " +
            "Provide the destination address and a fee priority.";
          const tLabel = document.createElement("label");
          tLabel.textContent = "target address";
          const t = document.createElement("input");
          t.placeholder = "bc1q…";
          const pLabel = document.createElement("label");
          pLabel.textContent = "priority";
          const p = document.createElement("select");
          for (const v of ["normal", "high", "urgent"]) {
            const o = document.createElement("option");
            o.value = v;
            o.textContent = v;
            p.append(o);
          }
          const errLine = document.createElement("div");
          errLine.className = "danger";
          const row = document.createElement("div");
          row.className = "row";
          const cancel = document.createElement("button");
          cancel.className = "ghost";
          cancel.textContent = "cancel";
          const ok = document.createElement("button");
          ok.className = "primary";
          ok.textContent = "jump";
          row.append(cancel, ok);
          m.append(h, hint, tLabel, t, pLabel, p, errLine, row);
          setTimeout(() => t.focus(), 0);
          ok.addEventListener("click", () => {
            if (!t.value.trim()) {
              errLine.textContent = "target address is required";
              return;
            }
            done({
              lock_id: lock.lock_id,
              target_address: t.value.trim(),
              priority: p.value,
            });
          });
          cancel.addEventListener("click", () => done(null));
        });
        if (!data) return;
        try {
          const v = await invoke("locks_jump", data);
          if (v.jump_txid) {
            showToast(`Jump broadcast: ${v.jump_txid.slice(0, 12)}…`);
          } else {
            showToast("Jump scheduled.");
          }
          await refreshLocks();
        } catch (e) {
          showErr(`jump lock: ${e}`);
        }
      }

      $("#balance-refresh").addEventListener("click", refreshBalance);
      $("#receive-go").addEventListener("click", showAddress);
      $("#send-go").addEventListener("click", sendPayment);
      $("#history-refresh").addEventListener("click", refreshHistory);
      $("#doctor-refresh").addEventListener("click", refreshDoctor);
      els.picker.addEventListener("change", onPickerChange);
      $("#wallet-unlock-btn").addEventListener("click", doUnlock);
      $("#wallet-lock-btn").addEventListener("click", doLock);
      $("#wallet-new-btn").addEventListener("click", () => onboardingFlow());
      $("#wallet-import-btn").addEventListener("click", () => importFlow());
      async function refreshIdentity() {
        clearErr();
        const setText = (id, value) => {
          $("#" + id).textContent = value;
        };
        try {
          const v = await invoke("wallet_ghost_id");
          setText("identity-ghost-id", v.ghost_id || "—");
          setText("identity-scan-key", v.scan_public_key_hex || "—");
          setText("identity-spend-key", v.spend_public_key_hex || "—");
        } catch (e) {
          setText("identity-ghost-id", "—");
          setText("identity-scan-key", "—");
          setText("identity-spend-key", "—");
          showErr(`identity: ${e}`);
        }
        try {
          const s = await invoke("gsp_session_status");
          if (s && s.has_session) {
            const exp = s.expires_at
              ? new Date(s.expires_at * 1000).toISOString()
              : "(no expiry)";
            setText("identity-session", `wallet=${s.wallet_name} · expires ${exp}`);
          } else {
            setText("identity-session", "no session — run gsp auth first");
          }
        } catch {
          /* leave default text */
        }
      }

      async function doGspAuth() {
        clearErr();
        try {
          await invoke("gsp_auth");
          showToast("Authenticated with GSP.");
          await refreshIdentity();
        } catch (e) {
          showErr(`gsp auth: ${e}`);
        }
      }
      async function doRegisterScanKey() {
        clearErr();
        try {
          const v = await invoke("gsp_register_scan_key");
          const k = v.scan_pubkey_hex
            ? v.scan_pubkey_hex.slice(0, 12) + "…"
            : "registered";
          showToast(`Scan key registered: ${k}`);
        } catch (e) {
          showErr(`register scan key: ${e}`);
        }
      }

      $("#locks-prepare-btn").addEventListener("click", () => prepareLockFlow());
      $("#locks-refresh").addEventListener("click", () => refreshLocks());
      async function refreshSettings() {
        clearErr();
        const tbody = $("#settings-body");
        tbody.innerHTML = "";
        try {
          const v = await invoke("daemon_env");
          const idle =
            v.idle_lock_secs === 0
              ? "disabled"
              : `${v.idle_lock_secs}s of idle then locks all wallets`;
          const rows = [
            ["network", v.network],
            ["socket", v.socket_path],
            ["wallets dir", v.wallets_dir],
            ["ghost-pay", (v.ghost_pay_urls || []).join(", ")],
            ["gsp", (v.gsp_urls || []).join(", ")],
            ["tor proxy", v.tor_proxy || "(direct)"],
            ["idle lock", idle],
          ];
          for (const [k, val] of rows) {
            const tr = document.createElement("tr");
            tr.innerHTML =
              `<th style="width:140px;text-align:left;">${k}</th>` +
              `<td style="font-family:ui-monospace;font-size:12px;">${val ?? ""}</td>`;
            tbody.append(tr);
          }
        } catch (e) {
          showErr(`settings: ${e}`);
        }
      }
      $("#settings-refresh").addEventListener("click", () => refreshSettings());

      $("#identity-refresh").addEventListener("click", () => refreshIdentity());
      $("#identity-gsp-auth").addEventListener("click", () => doGspAuth());
      $("#identity-register-scan").addEventListener("click", () => doRegisterScanKey());

      function showToast(message) {
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = message;
        document.body.append(t);
        setTimeout(() => t.remove(), 5000);
      }

      // Listen for live BIP-352 detections coming off the daemon's
      // WatchPayments stream. Show a toast and refresh the balance + history
      // panels so the user sees the new funds without re-clicking.
      listen("wraith://payment-detected", (ev) => {
        const p = ev.payload || {};
        const sat = (p.amount_sats ?? "?").toString();
        showToast(`Payment received: ${sat} sat (vout ${p.vout})`);
        refreshBalance();
        refreshHistory();
      });
      listen("wraith://watch-error", (ev) => {
        const m = (ev.payload && ev.payload.message) || "watch error";
        showErr(`watch: ${m}`);
      });

      (async function init() {
        // Restore last-active tab if it's a known one. Default = home.
        const known = new Set(
          [...document.querySelectorAll("nav button")].map((b) => b.dataset.tab)
        );
        let saved;
        try { saved = localStorage.getItem(TAB_KEY); } catch {}
        if (saved && known.has(saved)) {
          selectTab(saved);
        }
        await refreshHealth();
        await refreshWalletList();
        // Fresh install path: if no wallets exist yet, kick off the
        // onboarding flow automatically. Already-set-up users hit refresh
        // and balance instead.
        try {
          const v = await invoke("wallet_list");
          if ((v.wallets || []).length === 0) {
            await onboardingFlow();
          }
        } catch {
          // wallet_list errored — let the rest of init surface the failure.
        }
        await refreshBalance();
        // Start the live subscription. Idempotent on the daemon side, so
        // calling it on every init() is fine.
        try {
          await invoke("start_watch");
        } catch (e) {
          // Don't surface as a hard error — the user can still use the GUI
          // in poll-only mode.
          console.warn("start_watch failed:", e);
        }
        // Background health probe: 5s cadence is well below tokio-tungstenite
        // keepalive (30s) and roomy enough that we're not hammering the
        // daemon. The recovery edge in refreshHealth() also retries
        // start_watch in case the daemon was killed and came back.
        setInterval(async () => {
          const wasDown = healthDownLast === true;
          await refreshHealth();
          if (wasDown && healthDownLast === false) {
            try { await invoke("start_watch"); } catch {}
          }
        }, 5000);
      })();
    </script>
  </body>
</html>
