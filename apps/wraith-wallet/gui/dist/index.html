<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wraith Wallet</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        background: #0e0f12;
        color: #d8d8d8;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #232328;
        font-weight: 600;
      }
      main {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button {
        background: #1d4ed8;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #1e3a8a;
      }
      pre {
        background: #181a1f;
        padding: 12px;
        border-radius: 6px;
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        font-size: 13px;
        color: #c8c8c8;
        overflow: auto;
        margin: 0;
      }
      .check {
        display: grid;
        grid-template-columns: 80px 140px 1fr;
        gap: 12px;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #1c1d22;
      }
      .pass { color: #4ade80; font-weight: 600; }
      .fail { color: #f87171; font-weight: 600; }
      .skip { color: #9ca3af; font-weight: 600; }
    </style>
  </head>
  <body>
    <header>Wraith Wallet</header>
    <main>
      <div class="row">
        <button id="health">daemon health</button>
        <button id="doctor">doctor</button>
        <span id="version" style="color: #9ca3af; margin-left: auto;"></span>
      </div>
      <div id="checks"></div>
      <pre id="raw"></pre>
    </main>

    <script type="module">
      const { invoke } = window.__TAURI__.core;

      const health = document.getElementById("health");
      const doctor = document.getElementById("doctor");
      const checks = document.getElementById("checks");
      const raw = document.getElementById("raw");
      const versionLabel = document.getElementById("version");

      async function show(label, value) {
        raw.textContent = label + "\n" + JSON.stringify(value, null, 2);
      }

      async function renderHealth() {
        try {
          const v = await invoke("daemon_health");
          versionLabel.textContent = `daemon v${v.daemon_version} — uptime ${v.uptime_secs}s`;
          checks.innerHTML = "";
          show("daemon_health", v);
        } catch (e) {
          versionLabel.textContent = "daemon not reachable";
          show("daemon_health (error)", e);
        }
      }

      async function renderDoctor() {
        try {
          const v = await invoke("daemon_doctor");
          checks.innerHTML = "";
          for (const c of v.checks ?? []) {
            const row = document.createElement("div");
            row.className = "check";
            const status = document.createElement("span");
            status.className = c.status;
            status.textContent = c.status.toUpperCase();
            const name = document.createElement("span");
            name.textContent = c.name;
            const detail = document.createElement("span");
            detail.textContent = c.detail;
            detail.style.color = "#9ca3af";
            row.append(status, name, detail);
            checks.append(row);
          }
          show("daemon_doctor", v);
        } catch (e) {
          show("daemon_doctor (error)", e);
        }
      }

      health.addEventListener("click", renderHealth);
      doctor.addEventListener("click", renderDoctor);

      // First load → run health automatically
      renderHealth();
    </script>
  </body>
</html>
