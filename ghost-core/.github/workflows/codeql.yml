name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "ghost-main", "main" ]
  pull_request:
    branches: [ "ghost-main", "main" ]
  schedule:
    # Run weekly on Sunday at 3am UTC
    - cron: '0 3 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp', 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install dependencies (C++)
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libsqlite3-dev

      - name: Build (C++)
        if: matrix.language == 'c-cpp'
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON
          cmake --build . -j$(nproc)

      - name: Autobuild (Python)
        if: matrix.language == 'python'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
