name: Nightly Tests

on:
  schedule:
    # Run at 3am UTC every night
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1

defaults:
  run:
    shell: bash

jobs:
  extended-functional-tests:
    name: 'Extended Functional Tests'
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libzmq3-dev libminiupnpc-dev libnatpmp-dev \
            libsqlite3-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: nightly-ccache-${{ github.sha }}
          restore-keys: |
            nightly-ccache-
            linux-ccache-

      - name: Build Ghost Core
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=ON -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Run extended functional tests
        run: |
          ln -sf $PWD/build/test/config.ini test/config.ini
          # Run broader set of functional tests
          python3 test/functional/test_runner.py \
            --jobs=4 \
            --timeout-factor=6 \
            --combinedlogslen=10000 \
            --exclude=feature_dbcrash.py \
            --exclude=feature_pruning.py \
            --exclude=feature_index_prune.py
        timeout-minutes: 120

  ghost-specific-tests:
    name: 'Ghost-Specific Tests'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libzmq3-dev libminiupnpc-dev libnatpmp-dev \
            libsqlite3-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: nightly-ghost-ccache-${{ github.sha }}
          restore-keys: |
            nightly-ghost-ccache-
            linux-ccache-

      - name: Build Ghost Core
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=ON -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)

      - name: Run Ghost Lock tests
        run: |
          ln -sf $PWD/build/test/config.ini test/config.ini
          python3 test/functional/test_runner.py \
            --jobs=2 \
            --timeout-factor=4 \
            --combinedlogslen=4000 \
            wallet_ghostlock.py \
            wallet_ghostlock_spending.py

      - name: Run Silent Payment tests
        run: |
          python3 test/functional/test_runner.py \
            --jobs=2 \
            --timeout-factor=4 \
            --combinedlogslen=4000 \
            wallet_silentpayments.py \
            wallet_sp_scanning.py

      - name: Run Wraith Protocol tests
        run: |
          python3 test/functional/test_runner.py \
            --jobs=2 \
            --timeout-factor=4 \
            --combinedlogslen=4000 \
            wallet_wraith_edge_cases.py

      - name: Run SP scanning benchmark
        run: |
          python3 test/functional/bench_sp_scanning.py
        continue-on-error: true

  fuzz-extended:
    name: 'Extended Fuzz Testing'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libzmq3-dev ccache clang

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: nightly-fuzz-ccache-${{ github.sha }}
          restore-keys: |
            nightly-fuzz-ccache-

      - name: Build with fuzzing support
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=ON \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)
        continue-on-error: true

      - name: Run fuzz tests (2 hours)
        run: |
          if [ -f build/bin/fuzz ]; then
            # Run each fuzz target for 10 minutes
            for target in script_flags transaction_output; do
              echo "Fuzzing $target for 10 minutes..."
              timeout 600 ./build/bin/fuzz $target || true
            done
          else
            echo "Fuzz binary not built, skipping"
          fi
        timeout-minutes: 90
        continue-on-error: true

  security-audit:
    name: 'Security Audit'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for potential security issues
        run: |
          # Check for hardcoded credentials
          echo "Checking for potential hardcoded secrets..."
          ! grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" --include="*.cpp" --include="*.h" src/ || true

          # Check for unsafe functions
          echo "Checking for unsafe function usage..."
          ! grep -rn "strcpy\|strcat\|sprintf\|gets" --include="*.cpp" --include="*.h" src/ || true

          echo "Security audit complete"

      - name: Check dependencies for known vulnerabilities
        run: |
          # Check if any dependencies have known CVEs (basic check)
          echo "Checking dependency versions..."
          cat depends/packages/*.mk | grep -E "version|VERSION" | head -20 || true

  notify-failure:
    name: 'Notify on Failure'
    runs-on: ubuntu-24.04
    needs: [extended-functional-tests, ghost-specific-tests]
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly tests failed on ${new Date().toISOString().split('T')[0]}`;
            const body = `Nightly test run failed. Please investigate.\n\nRun: ${context.runId}\nWorkflow: ${context.workflow}`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['nightly-failure', 'ci']
              });
            }
