name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: 'Lint'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CONTAINER_NAME: "ghost-linter"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: CI script
        run: |
          set -o xtrace
          docker build -t "$CONTAINER_NAME" --file "./ci/lint_imagefile" .
          docker run --rm -v "$(pwd)":/ghost "$CONTAINER_NAME"

  linux-build:
    name: 'Linux x86_64'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libzmq3-dev libminiupnpc-dev libnatpmp-dev \
            libsqlite3-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-${{ github.sha }}
          restore-keys: |
            linux-ccache-

      - name: Build Ghost Core
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=ON -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)

      - name: Verify binaries
        run: |
          ./build/bin/ghostd --version
          ./build/bin/ghost-cli --version

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Run functional tests (core)
        run: |
          # Link config.ini from build dir to test dir where test_runner expects it
          ln -sf $PWD/build/test/config.ini test/config.ini
          # Run core Bitcoin functional tests
          python3 test/functional/test_runner.py \
            --jobs=4 \
            --timeout-factor=4 \
            --combinedlogslen=4000 \
            --exclude=feature_dbcrash.py \
            --exclude=feature_pruning.py \
            --exclude=feature_index_prune.py \
            wallet_basic.py \
            wallet_backup.py \
            wallet_encryption.py \
            wallet_keypool.py \
            rpc_blockchain.py \
            rpc_misc.py \
            p2p_segwit.py \
            feature_taproot.py

      - name: Run functional tests (Ghost-specific)
        run: |
          ln -sf $PWD/build/test/config.ini test/config.ini
          # Run Ghost-specific functional tests
          python3 test/functional/test_runner.py \
            --jobs=2 \
            --timeout-factor=4 \
            --combinedlogslen=4000 \
            wallet_ghostlock.py \
            wallet_ghostlock_spending.py \
            wallet_silentpayments.py \
            wallet_sp_scanning.py \
            wallet_wraith_edge_cases.py
        continue-on-error: true  # Allow CI to pass while Ghost RPCs are being stabilized

  macos-build:
    name: 'macOS ARM64'
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install automake libtool boost pkg-config libevent \
            miniupnpc libnatpmp zeromq sqlite ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-ccache-${{ github.sha }}
          restore-keys: |
            macos-ccache-

      - name: Build Ghost Core
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=ON -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(sysctl -n hw.ncpu)

      - name: Verify binaries
        run: |
          ./build/bin/ghostd --version
          ./build/bin/ghost-cli --version

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Run functional tests
        run: |
          ln -sf $PWD/build/test/config.ini test/config.ini
          # Run core functional tests (Ghost-specific tests need RPC implementation work)
          python3 test/functional/test_runner.py \
            --jobs=4 \
            --timeout-factor=4 \
            wallet_basic.py \
            wallet_encryption.py

  windows-cross:
    name: 'Windows x86_64 (cross)'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 g++-mingw-w64-x86-64-posix ccache \
            nsis

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: windows-ccache-${{ github.sha }}
          restore-keys: |
            windows-ccache-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build Ghost Core for Windows
        run: |
          mkdir build && cd build
          cmake .. --toolchain ../depends/x86_64-w64-mingw32/toolchain.cmake \
            -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)

      - name: Verify binaries exist
        run: |
          ls -la build/bin/ghostd.exe
          ls -la build/bin/ghost-cli.exe

  arm64-cross:
    name: 'Linux ARM64 (cross)'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 g++-aarch64-linux-gnu ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: arm64-ccache-${{ github.sha }}
          restore-keys: |
            arm64-ccache-

      - name: Build depends
        run: |
          cd depends
          make HOST=aarch64-linux-gnu -j$(nproc)

      - name: Build Ghost Core for ARM64
        run: |
          mkdir build && cd build
          cmake .. --toolchain ../depends/aarch64-linux-gnu/toolchain.cmake \
            -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build . -j$(nproc)

      - name: Verify binaries exist
        run: |
          ls -la build/bin/ghostd
          ls -la build/bin/ghost-cli
          file build/bin/ghostd | grep -i aarch64

  coverage:
    name: 'Code Coverage'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev libevent-dev \
            libboost-all-dev libsqlite3-dev lcov

      - name: Build with coverage
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_GUI=OFF -DBUILD_TESTS=ON -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF -DENABLE_WALLET=ON \
            -DCMAKE_BUILD_TYPE=Coverage
          cmake --build . -j$(nproc)

      - name: Capture baseline coverage
        run: |
          cd build
          lcov --capture --initial --directory . --output-file baseline.info

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Capture test coverage
        run: |
          cd build
          lcov --capture --directory . --output-file test.info
          lcov --add-tracefile baseline.info --add-tracefile test.info --output-file combined.info
          # Filter out system headers and test code
          lcov --remove combined.info '/usr/*' '*/test/*' '*/src/test/*' --output-file lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/lcov.info
          flags: ghost-core
          fail_ci_if_error: false
